<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60" width="100%" height="100%">
    <defs>
        <style>
            :root {
            /* Light Mode Colors */
            --bracket-color: #FF2A5F;
            --db-top: #00E5FF;
            --db-mid: #00BFFF;
            --db-bot: #0088FF;
            --db-stroke: #0A192F;
            }

            @media (prefers-color-scheme: dark) {
            :root {
            /* Dark Mode Colors */
            --bracket-color: #FF5C85;
            --db-top: #84FFFF;
            --db-mid: #00E5FF;
            --db-bot: #00BFFF;
            --db-stroke: #F8F9FA;
            }
            }

            .bracket {
            stroke: var(--bracket-color);
            stroke-width: 5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            }

            .db-layer {
            stroke: var(--db-stroke);
            stroke-width: 2.5;
            stroke-linejoin: round;
            }

            .layer-top { fill: var(--db-top); }
            .layer-mid { fill: var(--db-mid); }
            .layer-bot { fill: var(--db-bot); }
        </style>
    </defs>

    <path d="M 26 18 L 12 31 L 26 44" class="bracket" />

    <g id="database-icon">
        <path d="M 36 31 L 36 45 A 24 8 0 0 0 84 45 L 84 31 A 24 8 0 0 1 36 31 Z" class="db-layer layer-bot" />

        <path d="M 36 17 L 36 31 A 24 8 0 0 0 84 31 L 84 17 A 24 8 0 0 1 36 17 Z" class="db-layer layer-mid" />

        <ellipse cx="60" cy="17" rx="24" ry="8" class="db-layer layer-top" />
    </g>

    <path d="M 94 18 L 108 31 L 94 44" class="bracket" />
</svg>